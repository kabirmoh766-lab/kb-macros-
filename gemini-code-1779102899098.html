<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Macro Studio</title>
    <style>
        :root {
            --bg-dark: #12131a;
            --panel-bg: #1c1d26;
            --accent-purple: #7c4dff;
            --accent-green: #00e676;
            --text-main: #f5f5f7;
            --text-muted: #8a8d9a;
            --border-color: #2d2f3d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Sidebar - Profiles List */
        .sidebar {
            width: 280px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h2, h3 { margin: 0; color: var(--text-main); }

        .btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-success { background: var(--accent-green); color: #000; }
        .btn-secondary { background: #3a3b4c; }

        /* Macro Builder Cards */
        .config-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            background: #12131a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: 1px solid var(--accent-purple);
        }

        /* Action Timeline Sequence */
        .timeline {
            margin-top: 20px;
            background: #12131a;
            border-radius: 6px;
            padding: 15px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-node {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .node-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-key { background: rgba(124, 77, 255, 0.2); color: #b39ddb; }
        .badge-delay { background: rgba(233, 30, 99, 0.2); color: #f48fb1; }

        .delete-node {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>🎮 Profile Layouts</h3>
        <button class="btn btn-secondary" onclick="alert('Profile Saved!')">+ New Profile</button>
        <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;">
            <div style="padding: 10px; background: rgba(124,77,255,0.1); border-left: 3px solid var(--accent-purple); border-radius: 4px; cursor: pointer;">
                🎯 Apex RapidFire
            </div>
            <div style="padding: 10px; border-radius: 4px; cursor: pointer; color: var(--text-muted);">
                🛡️ RPG Combo Key
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="header">
            <div>
                <h2>Macro Engine Setup</h2>
                <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 0.9rem;">Map bindings and macro loops similar to TGMacro & reWASD</p>
            </div>
            <button class="btn btn-success" id="export-btn">Export Config Script</button>
        </div>

        <div class="config-panel">
            <h3>1. Binding & Trigger</h3>
            <br>
            <div class="grid-2">
                <div class="form-group">
                    <label>Activation Trigger Key</label>
                    <input type="text" id="trigger-key" value="F4" placeholder="Press a key...">
                </div>
                <div class="form-group">
                    <label>Loop Mode (Execution)</label>
                    <select id="loop-mode">
                        <option value="hold">While Key is Pressed (Hold)</option>
                        <option value="toggle">Toggle On / Off</option>
                        <option value="once">Execute Once</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="config-panel">
            <h3>2. Sequence Builder (Actions Pipeline)</h3>
            <br>
            <div style="display: flex; gap: 15px; align-items: flex-end;">
                <div class="form-group" style="flex: 1;">
                    <label>Action Type</label>
                    <select id="step-type">
                        <option value="key">Keyboard Key Press</option>
                        <option value="delay">Time Delay (ms)</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label id="value-label">Target Key / Time value</label>
                    <input type="text" id="step-value" placeholder="e.g., LButton or 50">
                </div>
                <button class="btn" id="add-step-btn">+ Add Step</button>
            </div>

            <div class="timeline" id="timeline-container">
                </div>
        </div>
    </div>

    <script>
        // State management
        let macroSequence = [
            { id: 1, type: 'key', value: 'LButton (Click)' },
            { id: 2, type: 'delay', value: '35' },
            { id: 3, type: 'key', value: 'R' },
            { id: 4, type: 'delay', value: '50' }
        ];

        const timelineContainer = document.getElementById('timeline-container');
        const addStepBtn = document.getElementById('add-step-btn');
        const stepType = document.getElementById('step-type');
        const stepValue = document.getElementById('step-value');
        const exportBtn = document.getElementById('export-btn');

        // Dynamic Label Updating
        stepType.addEventListener('change', () => {
            if (stepType.value === 'key') {
                stepValue.placeholder = "e.g., LButton, Space, Q";
            } else {
                stepValue.placeholder = "Time in milliseconds (e.g. 50)";
            }
        });

        // Add a step to sequence
        addStepBtn.addEventListener('click', () => {
            const val = stepValue.value.trim();
            if (!val) return alert("Please specify a key or timing delay value.");

            const newStep = {
                id: Date.now(),
                type: stepType.value,
                value: val
            };

            macroSequence.push(newStep);
            stepValue.value = '';
            renderTimeline();
        });

        // Delete a step
        window.deleteStep = function(id) {
            macroSequence = macroSequence.filter(item => item.id !== id);
            renderTimeline();
        };

        // Render execution timeline UI
        function renderTimeline() {
            timelineContainer.innerHTML = '';
            if (macroSequence.length === 0) {
                timelineContainer.innerHTML = '<div style="color: var(--text-muted); text-align: center; margin-top: 50px;">Sequence empty. Add steps above to build your macro loops.</div>';
                return;
            }

            macroSequence.forEach((step, index) => {
                const node = document.createElement('div');
                node.className = 'action-node';
                
                const isKey = step.type === 'key';
                const badgeClass = isKey ? 'badge-key' : 'badge-delay';
                const typeText = isKey ? 'Key Action' : 'Delay';
                const displayValue = isKey ? `Press [ ${step.value} ]` : `Wait ${step.value} ms`;

                node.innerHTML = `
                    <div class="node-info">
                        <span style="color: var(--text-muted); font-family: monospace;">#${index + 1}</span>
                        <span class="badge ${badgeClass}">${typeText}</span>
                        <span>${displayValue}</span>
                    </div>
                    <button class="delete-node" onclick="deleteStep(${step.id})">×</button>
                `;
                timelineContainer.appendChild(node);
            });
        }

        // Generate and Export configuration script
        exportBtn.addEventListener('click', () => {
            const trigger = document.getElementById('trigger-key').value || 'F4';
            const mode = document.getElementById('loop-mode').value;
            
            // Build a production-ready AutoHotkey script parsing our UI settings data
            let scriptText = ``;
            scriptText += `; ======================================\n`;
            scriptText += `; Generated Profile via G-Macro Studio\n`;
            scriptText += `; Trigger Key: ${trigger} | Mode: ${mode}\n`;
            scriptText += `; ======================================\n\n`;

            if (mode === 'toggle') {
                scriptText += `_toggle := false\n`;
                scriptText += `$${trigger}::\n`;
                scriptText += `_toggle := !_toggle\n`;
                scriptText += `while (_toggle) {\n`;
                macroSequence.forEach(step => {
                    if (step.type === 'key') scriptText += `    Send, {${step.value}}\n`;
                    if (step.type === 'delay') scriptText += `    Sleep, ${step.value}\n`;
                });
                scriptText += `}\nreturn\n`;
            } else {
                // Default Hold execution loop structure
                scriptText += `$${trigger}::\n`;
                scriptText += `while GetKeyState("${trigger}", "P") {\n`;
                macroSequence.forEach(step => {
                    if (step.type === 'key') scriptText += `    Send, {${step.value}}\n`;
                    if (step.type === 'delay') scriptText += `    Sleep, ${step.value}\n`;
                });
                scriptText += `}\nreturn\n`;
            }

            // Trigger file download pipeline
            const blob = new Blob([scriptText], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'macro_profile.ahk';
            link.click();
        });

        // Initialize display
        renderTimeline();
    </script>
</body>
</html>
